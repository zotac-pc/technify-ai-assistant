<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAIA | Premium Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>TAIA</h2>
                <span class="badge">Enterprise</span>
            </div>
            
            <div class="auth-section">
                <h3>Authentication</h3>
                <input type="text" id="tokenInput" placeholder="Paste JWT Bearer Token Here..." />
                <button onclick="saveToken()" class="btn-primary">Save Token</button>
            </div>
            
            <div class="fallback-auth">
                <p>Or use Dev Fallback:</p>
                <select id="roleSelect">
                    <option value="Student">Student</option>
                    <option value="Faculty">Faculty</option>
                    <option value="Admin">Admin</option>
                </select>
                <input type="text" id="userIdInput" value="STU-0001">
            </div>
            
            <div class="quick-actions">
                <button onclick="sendMessage('What is my attendance?')" class="quick-btn">📚 Check Attendance</button>
                <button onclick="sendMessage('Show my latest results')" class="quick-btn">📊 View Grades</button>
                <button onclick="sendMessage('What is the library policy?')" class="quick-btn">🏛️ University Policy</button>
                <a href="/admin" style="text-decoration: none;">
                    <button class="quick-btn" style="border-color: #ef4444; color: #ef4444;">🛡️ Admin Dashboard</button>
                </a>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <h1>Technify Academic Assistant</h1>
                <p>Secure, AI-powered academic support</p>
            </header>
            
            <div id="chatbox" class="messages-container">
                <div class="message ai-message">
                    <div class="avatar">🤖</div>
                    <div class="content">Hello! I am TAIA, your academic assistant. Please authenticate to begin.</div>
                </div>
            </div>
            
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Ask anything..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" class="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                </button>
            </div>
        </main>
    </div>
    <script src="/static/chat.js"></script>
</body>
</html>
