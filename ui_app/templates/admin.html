<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAIA | Admin Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
            padding: 2rem;
            overflow-y: auto;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-card h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .stat-card p {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .table-container {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            color: var(--text-primary);
        }
        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: var(--bg-hover);
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .refresh-btn {
            background-color: var(--btn-primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s;
        }
        .refresh-btn:hover {
            background-color: var(--btn-primary-hover);
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .badge {
            background-color: #ef4444; 
            color: white; 
            padding: 2px 6px; 
            border-radius: 12px; 
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="user-info" id="adminInfo" style="margin-top: 15px;">
                    <div class="avatar" style="background-color: #ef4444; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 10px;">
                        A
                    </div>
                    <div class="details">
                        <div class="name" style="color: var(--text-primary); font-weight: 500;">Admin User</div>
                        <div class="badge" style="display: inline-block; background-color: #ef4444; color: white; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-top: 5px;">Admin</div>
                    </div>
                </div>
                
                <script>
                    if (!localStorage.getItem('taia_role') || localStorage.getItem('taia_role').toLowerCase() !== 'admin') {
                        document.getElementById('adminInfo').style.display = 'none';
                    }
                </script>
            </div>
            
            <div class="sidebar-bottom">
                <a href="/" style="text-decoration: none;">
                    <button class="new-chat-btn">
                        <i class="fas fa-arrow-left"></i> Back to Chat
                    </button>
                </a>
            </div>
        </aside>

        <!-- Main Dashboard Area -->
        <main class="dashboard-area">
            <div class="dashboard-header">
                <div>
                    <h1 style="color: var(--text-primary);">Audit Logs Dashboard</h1>
                    <p style="color: var(--text-secondary); margin-top: 0.5rem;">View system queries and latency metrics</p>
                </div>
                <button class="refresh-btn" onclick="fetchLogs()">🔄 Refresh Logs</button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Queries (Limit 50)</h3>
                    <p id="totalQueries">-</p>
                </div>
                <div class="stat-card">
                    <h3>Avg Latency (s)</h3>
                    <p id="avgLatency">-</p>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Timestamp</th>
                            <th>User ID</th>
                            <th>Role</th>
                            <th>Intent</th>
                            <th>Latency</th>
                        </tr>
                    </thead>
                    <tbody id="logsTableBody">
                        <tr>
                            <td colspan="6" style="text-align: center; color: var(--text-secondary);">Click 'Refresh Logs' to load data</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="/static/admin.js"></script>
</body>
</html>
